apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-platform
  template:
    metadata:
      labels:
        app: ai-devops-platform
    spec:
      containers:
        - name: app
          image: lavanyaasuti/ai-devops-platform:latest
          ports:
            - containerPort: 8000