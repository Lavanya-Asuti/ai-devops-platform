apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-devops-platform

  template:
    metadata:
      labels:
        app: ai-devops-platform

    spec:
      containers:
        - name: ai-devops-platform
          image: ai-devops-platform:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"